<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GLM-OCR{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css?v={{ cache_bust | default('1') }}">
    <!-- Markdown rendering: marked.js + highlight.js + KaTeX -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="/static/event-bus.js?v={{ cache_bust | default('1') }}"></script>
    <script src="/static/pdf-viewer.js?v={{ cache_bust | default('1') }}"></script>
    <script src="/static/ocr-settings.js?v={{ cache_bust | default('1') }}"></script>
</head>
<body>
    <header>
        <nav>
            <span class="logo">[GLM-OCR]</span>
            <a href="/">Pipeline</a>
            <a href="/settings">Settings</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        Config: {{ config_path | default("tui_config.yaml") }}
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
